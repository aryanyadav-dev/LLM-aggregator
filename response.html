<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Response</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Styles for positioning and layout */
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000000; /* Set background to black */
            color: #ffffff; /* Set default text color to white */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .navbar {
            background-color: #333; /* Dark gray for navbar */
            color: #fff;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-size: 1.5rem;
        }

        .login-button {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
        }

        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative; /* Position for absolute children */
        }

        main {
            width: 100%;
            max-width: 1000px; /* Max width for main content */
            display: flex;
            flex-direction: column;
            align-items: center; /* Center items */
            position: relative;
        }

        /* Position the prompt on the top-right corner */
        .cylindrical-bar {
            background-color: #222; /* Dark gray for contrast with black background */
            color: #fff; /* White text */
            border-radius: 25px;
            padding: 10px 20px;
            position: absolute;
            top: 10px; /* Adjusted position higher up */
            right: 20px; /* Keeping it to the right */
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5); /* Slight shadow */
            font-size: 1.2rem; /* Font size */
            max-width: 300px; /* Max width for cylindrical bar */
            word-wrap: break-word;
        }

        /* New prompt form box */
        .prompt-container {
            background-color: #222; /* Dark gray background */
            color: #fff;
            border-radius: 25px;
            padding: 10px 20px;
            position: absolute;
            top: 80px; /* Place the form under the previous prompt */
            right: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5); /* Add shadow */
            display: flex;
            align-items: center;
            max-width: 300px;
        }

        .prompt-input {
            background-color: #333;
            border: none;
            color: #fff;
            padding: 10px;
            border-radius: 20px;
            width: 100%;
            margin-right: 10px;
        }

        .arrow-btn {
            background-color: #444;
            border: none;
            color: #fff;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
        }

        .response-container {
            padding: 20px;
            border: 1px solid #444; /* Slight border for contrast */
            border-radius: 8px;
            background-color: #222; /* Dark gray background */
            color: #ffffff; /* White text for response */
            box-shadow: 0 2px 4px rgba(255, 255, 255, 0.1); /* Light shadow */
            max-width: 800px; /* Max width for response container */
            text-align: center;
            margin-top: 50px; /* Reduced space above the response container */
        }

        .response-container h2 {
            margin-top: 0; /* No margin for the heading */
        }

        .response-container p {
            font-size: 1.1rem; /* Font size for response text */
            line-height: 1.5; /* Line height for better readability */
        }

        /* Ensure page looks good on smaller screens */
        @media (max-width: 768px) {
            .cylindrical-bar {
                top: 10px; /* Adjusted for mobile */
                right: 10px; /* Adjusted for mobile */
                font-size: 1rem; /* Font size for mobile */
                padding: 8px 16px; /* Padding for mobile */
            }

            .prompt-container {
                top: 60px; /* Adjust for mobile */
                right: 10px; /* Adjust for mobile */
                max-width: 90%;
            }

            .response-container {
                width: 90%; /* Full width on mobile */
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-fixed">
        <div class="brand">LLM Aggregator</div>
        <a href="#" class="login-button">Login</a>
    </nav>

    <div class="main-container">
        <main class="main-content">
            <!-- Prompt is placed in the top-right corner and dynamically updated -->
            <div class="cylindrical-bar">
                <strong>{{ prompt }}</strong> <!-- Displays the actual prompt typed by the user -->
            </div>

            <!-- New prompt input form -->
            <div class="prompt-container">
                <form id="new-prompt-form" action="/generate" method="POST">
                    <input type="text" name="prompt" class="prompt-input" placeholder="Enter your next prompt..." required>
                    <button type="submit" class="arrow-btn">➔</button>
                </form>
            </div>

            <!-- Response is center-aligned -->
            <div class="response-container">
                <h2>Response:</h2>
                <p>{{ response }} <!-- Displays the API response here --> </p>
            </div>
        </main>
    </div>
</body>
</html>
